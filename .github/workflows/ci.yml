name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 streamlit_app.py --max-line-length=120 --count --show-source --statistics

  python-tests:
    name: Python Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/test_streamlit_app.py -v --tb=short

  js-tests:
    name: JavaScript Tests (QUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run QUnit tests headlessly
        run: npx --yes qunit-puppeteer tests/index.html || echo "See tests/index.html for full run"

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install safety pip-audit
      - run: pip install -r requirements.txt
      - run: pip-audit || true
